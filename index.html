<!-- ── Globals ── -->
<script>
  window.SB_URL = "https://xqezegrphnwfxyuxadzd.supabase.co";
  window.SB_KEY = "sb_publishable_IY28r6SMHCOavF4a8XHJQQ_uTFMZseW";

  window.EMAILJS_SVC = "YOUR_SERVICE_ID";
  window.EMAILJS_TPL = "YOUR_TEMPLATE_ID";
  window.EMAILJS_KEY = "YOUR_PUBLIC_KEY";

  // Detectar empresa por ?e=slug o subdominio
  (function () {
    const params   = new URLSearchParams(window.location.search);
    const paramSlug = params.get("e") || null;
    const host      = window.location.hostname;
    const parts     = host.split(".");
    const skipSubs  = ["app","www","localhost","127"];
    const subSlug   = (parts.length >= 3 && !skipSubs.includes(parts[0])) ? parts[0] : null;
    window._companySlug = paramSlug || subSlug || null;
    window._companyId   = null;
    console.log("[Taseca] slug:", window._companySlug || "(sin empresa)");
  })();
</script>
