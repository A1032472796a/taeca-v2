<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Taseca · Barber & Tattoo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:#080c10;font-family:'Segoe UI',system-ui,sans-serif;overflow-x:hidden;color:#f0f0f0}
input,select,button{font-family:inherit}
select option{background:#1a2230;color:#f0f0f0}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0d1520}
::-webkit-scrollbar-thumb{background:#c9a84c55;border-radius:4px}
*{-webkit-text-fill-color:inherit}
.gradient-text{-webkit-text-fill-color:transparent!important}
b,strong{color:inherit;-webkit-text-fill-color:inherit}

/* ── ROOT LAYOUT ── */
#root{
  display:flex;min-height:100vh;width:100%;
  background:linear-gradient(160deg,#080c10,#0d1520);
}

/* ── MOBILE (default) ── */
.app-sidebar{display:none}
.app-main{flex:1;min-width:0;overflow-x:hidden;display:flex;flex-direction:column}
.tab-bar-mobile{
  position:fixed;bottom:0;left:0;right:0;
  background:#0d1520;border-top:1px solid #1e2a35;
  display:flex;z-index:100;
}
.tab-btn-m{
  flex:1;padding:9px 0 6px;background:none;border:none;
  display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;
}

/* ── TABLET (768px+) ── */
@media(min-width:768px){
  #root{flex-direction:row}
  .app-sidebar{
    display:flex;flex-direction:column;
    width:220px;min-width:220px;flex-shrink:0;
    background:#0d1520;border-right:1px solid #1e2a35;
    height:100vh;position:sticky;top:0;overflow-y:auto;
  }
  .app-main{height:100vh;overflow-y:auto;max-width:none}
  .tab-bar-mobile{display:none!important}
  .sidebar-nav{display:flex!important}
  .page-inner{padding:20px 24px!important}
  .kpi-grid-2{grid-template-columns:repeat(4,1fr)!important}
  .cal-slot-day{min-height:52px!important}
}

/* ── DESKTOP (1100px+) ── */
@media(min-width:1100px){
  .app-sidebar{width:240px;min-width:240px}
  .app-main{max-width:none}
  .desktop-2col{display:grid!important;grid-template-columns:1fr 1fr;gap:16px}
  .desktop-3col{display:grid!important;grid-template-columns:repeat(3,1fr);gap:14px}
  .cal-slot-day{min-height:56px!important}
}

/* ── WIDE DESKTOP (1400px+) ── */
@media(min-width:1400px){
  .app-sidebar{width:260px;min-width:260px}
}

/* Sidebar nav */
.sidebar-nav{display:none;flex-direction:column;padding:14px 12px;gap:3px;flex:1}
.sidebar-nav-btn{
  display:flex;align-items:center;gap:11px;
  padding:11px 14px;border-radius:11px;
  border:none;background:transparent;
  color:#6a7a8a;cursor:pointer;
  font-size:14px;font-weight:600;
  text-align:left;width:100%;
  transition:background .15s,color .15s;
}
.sidebar-nav-btn.active{background:#c9a84c22;color:#c9a84c;border-left:3px solid #c9a84c}
.sidebar-nav-btn:hover:not(.active){background:#1e2a35;color:#f0f0f0}
.sidebar-nav-btn .ico{font-size:20px;flex-shrink:0;width:24px;text-align:center}

/* ── ADMIN RESPONSIVE ── */
@media(min-width:768px){
  .mobile-header{display:none!important}
  .app-main{height:100vh;overflow:hidden}
  .page-inner{padding:20px 24px}
}
@media(min-width:1100px){.page-inner{padding:24px 28px}}

/* ── PUBLIC PAGE ── */
/* El root de Public llena toda la pantalla */
#pub-root{width:100%;min-height:100vh;display:flex;flex-direction:column;background:linear-gradient(160deg,#080c10,#0d1520)}
/* Hero llena el ancho, texto centrado */
#pub-hero{width:100%;text-align:center}
@media(min-width:768px){#pub-hero{padding:40px 20px 28px!important}}
/* Tabs: full width, con inner centrado */
#pub-tabs-wrap{width:100%;border-bottom:1px solid #1e2a35}
#pub-tabs{max-width:860px;margin:0 auto;display:flex}
/* Body: full width, inner centrado */
#pub-body{width:100%;flex:1}
#pub-inner{max-width:860px;margin:0 auto;padding:20px 16px 90px}
@media(min-width:768px){#pub-inner{padding:26px 28px 90px}}
@media(min-width:1100px){#pub-inner{max-width:1000px;padding:30px 36px 90px}}
/* Service / staff grids */
.svc-grid,.staff-grid{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:640px){
  .svc-grid{grid-template-columns:repeat(2,1fr)}
  .staff-grid{grid-template-columns:repeat(2,1fr)}
}
@media(min-width:1000px){
  .svc-grid{grid-template-columns:repeat(3,1fr)}
  .staff-grid{grid-template-columns:repeat(3,1fr)}
}
.svc-grid>div,.staff-grid>div{margin-bottom:0!important}
</style>

      loading&&ce("div",{style:{textAlign:"center",padding:"32px",color:C.muted}},"⏳ Cargando..."),
      !loading&&companies.length===0&&ce("div",{style:{textAlign:"center",padding:"40px",background:C.card,borderRadius:14,border:"1px dashed "+C.border}},
        ce("div",{style:{fontSize:40,marginBottom:10}},"🏢"),
        ce("b",{style:{color:C.muted}},"Sin empresas registradas")
      ),
      companies.map(function(co){
        var tc=COLORS[co.plan]||C.accent;
        var active=co.active!==false;
        var isSelected=sel.indexOf(co.id)>=0;
        return ce("div",{key:co.id,style:{background:C.card,border:"1px solid "+(isSelected?C.err+"88":active?tc+"44":C.border),borderRadius:14,padding:"13px 15px",marginBottom:10,opacity:active?1:0.6,transition:"border .15s"}},
          ce("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
            ce("div",{style:{display:"flex",alignItems:"center",gap:10}},
              /* Checkbox */
              ce("div",{
                onClick:function(e){
                  e.stopPropagation();
                  setSel(function(prev){
                    return prev.indexOf(co.id)>=0?prev.filter(function(x){return x!==co.id;}):prev.concat([co.id]);
                  });
                },
                style:{width:20,height:20,borderRadius:5,border:"2px solid "+(isSelected?C.err:C.border),background:isSelected?C.err:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"}
              }, isSelected?ce("span",{style:{color:"#fff",fontSize:12,fontWeight:900}},"✓"):null),
              ce("div",{style:{width:42,height:42,borderRadius:11,background:tc+"22",border:"1px solid "+tc+"44",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}},
                ICONS[co.plan]||"🏢"),
              ce("div",null,
                ce("b",{style:{fontSize:14}},co.company_name),
                ce("div",{style:{fontSize:11,color:C.cyan,marginTop:1}},"app.taseca.tech?e=",co.company_id),
                ce("div",{style:{fontSize:10,color:C.muted}},LABELS[co.plan]||co.plan)
              )
            ),
            ce("span",{style:{background:(active?C.ok:C.muted)+"22",color:active?C.ok:C.muted,fontSize:11,padding:"2px 8px",borderRadius:20,fontWeight:600}},active?"Activa":"Inactiva")
          ),
          ce("div",{style:{display:"flex",gap:6,marginTop:10}},
            ce("button",{type:"button",style:{flex:1,background:C.cyan,border:"none",borderRadius:10,padding:"6px",fontSize:11,color:"#000",fontWeight:700,cursor:"pointer"},
              onClick:function(){window.open("https://app.taseca.tech?e="+co.company_id,"_blank");}
            },"🚀 Abrir"),
            ce("button",{type:"button",style:{flex:1,background:"transparent",border:"1px solid "+C.border,borderRadius:10,padding:"6px",fontSize:11,color:C.muted,cursor:"pointer"},
              onClick:function(){
                fetch(window.SB_URL+"/rest/v1/company?id=eq."+co.id,{method:"PATCH",
                  headers:{"apikey":window.SB_KEY,"Authorization":"Bearer "+window.SB_KEY,"Content-Type":"application/json"},
                  body:JSON.stringify({active:!active})});
                setCompanies(function(x){return x.map(function(c){return c.id===co.id?Object.assign({},c,{active:!active}):c;});});
              }
            },active?"Desactivar":"Activar")
          )
        );
      })
    ),
    mdl&&ce(NewCompanyMdl,null)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App, null));
</script>
</body>
</html>
