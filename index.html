// Slots 30min 8am-8pm
var SLOTS=[];
for(var _h=8;_h<20;_h++){SLOTS.push((_h<10?"0":"")+_h+":00");SLOTS.push((_h<10?"0":"")+_h+":30");}

function parseTime(t){var p=t.split(":");return parseInt(p[0])*60+parseInt(p[1]);}
function toStr(d){return d.toISOString().slice(0,10);}
function todayStr(){return toStr(new Date());}

function calDays(year,month){
  var days=[],first=new Date(year,month,1),last=new Date(year,month+1,0);
  for(var i=0;i<first.getDay();i++) days.push(null);
  for(var d=1;d<=last.getDate();d++) days.push(new Date(year,month,d));
  return days;
}

function getWeekDates(base){
  var d=new Date(base),day=d.getDay(),mon=new Date(d);
  mon.setDate(d.getDate()-day);
  return Array.from({length:7},function(_,i){var dd=new Date(mon);dd.setDate(mon.getDate()+i);return dd;});
}

// Field component
function Field(props){
  var label=props.label,value=props.value,onChange=props.onChange,type=props.type||"text",options=props.options,placeholder=props.placeholder;
  return (
    <div style={{marginBottom:11}}>
      <label style={S.label}>{label}</label>
      {options
        ? <select style={S.input} value={value||""} onChange={function(e){onChange(e.target.value);}}>
            <option value="">Seleccionar...</option>
            {options.map(function(o){return <option key={o.v} value={o.v}>{o.l}</option>;})}
          </select>
        : <input style={S.input} type={type} placeholder={placeholder||""} value={value||""}
            onChange={function(e){onChange(e.target.value);}}
            onKeyDown={function(e){if(e.key==="Enter") e.preventDefault();}}/>

// ── PUNTOS ────────────────────────────────────────────────────────
function PointsBar(props){
  var points=props.points||0;
  var levels=[
    {name:"Bronze",min:0,max:100,color:"#cd7f32"},
    {name:"Silver",min:100,max:300,color:"#aaa"},
    {name:"Gold",min:300,max:700,color:C.accent},
    {name:"Platinum",min:700,max:1500,color:C.cyan}
  ];
  var cur=levels[0];
  for(var i=0;i<levels.length;i++){if(points>=levels[i].min&&points<levels[i].max){cur=levels[i];break;}}
  if(points>=1500) cur=levels[3];
  var pct=Math.min(100,((points-cur.min)/(cur.max-cur.min))*100)||0;
  var nextLevel=levels[levels.indexOf(cur)+1];
  return (
    <div style={{background:"#161e2a",borderRadius:14,padding:"12px 14px",border:"1px solid "+cur.color+"44",marginTop:10}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
        <div style={{fontWeight:700,color:cur.color,fontSize:13}}>⭐ {cur.name}</div>
        <div style={{color:C.accent,fontWeight:900,fontSize:14}}>{points} pts</div>
      </div>
      <div style={{background:C.border,borderRadius:20,height:8,overflow:"hidden"}}>
        <div style={{width:pct+"%",height:"100%",background:"linear-gradient(90deg,"+cur.color+","+C.accent+")",borderRadius:20}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
        <span style={{fontSize:10,color:C.muted}}>{cur.name}</span>
        <span style={{fontSize:10,color:C.muted}}>{nextLevel ? cur.max+" pts → "+nextLevel.name : "MAX"}</span>
      </div>
    </div>
  );
}

// ── CALENDAR WEEK VIEW ────────────────────────────────────────────
function WeekCalendar(props){
  var appointments=props.appointments,users=props.users,selectedStaffId=props.selectedStaffId,onSlotClick=props.onSlotClick,onApptClick=props.onApptClick;
  var weekState=useState(new Date());var weekBase=weekState[0];var setWeekBase=weekState[1];
  var weekDates=getWeekDates(weekBase);
  var staff=null;
  for(var i=0;i<users.length;i++){if(users[i].id===selectedStaffId){staff=users[i];break;}}
  var hours=[];for(var h=8;h<20;h++) hours.push(h);
  var weekStrs=weekDates.map(function(d){return toStr(d);});
  var weekAppts=appointments.filter(function(a){return(!selectedStaffId||a.staffId===selectedStaffId)&&weekStrs.indexOf(a.date)>=0;});

  function isWorkSlot(date,hour,min){
    if(!staff) return true;
    var dow=date.getDay();
    if(!staff.workDays||staff.workDays.indexOf(dow)<0) return false;
    var slotMins=hour*60+min;
    var start=parseTime(staff.workStart||"09:00");
    var end=parseTime(staff.workEnd||"19:00");
    return slotMins>=start&&slotMins<end;
  }

  function getAppt(ds,hour,min){
    var slot=(hour<10?"0":"")+hour+":"+(min===0?"00":"30");
    for(var i=0;i<weekAppts.length;i++){if(weekAppts[i].date===ds&&weekAppts[i].time===slot) return weekAppts[i];}
    return null;
  }

  return (
    <div style={{background:C.bg}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",borderBottom:"1px solid "+C.border}}>
        <button type="button" onClick={function(){var d=new Date(weekBase);d.setDate(d.getDate()-7);setWeekBase(d);}} style={{background:"none",border:"none",color:C.accent,fontSize:22,cursor:"pointer"}}>‹</button>
        <div style={{fontSize:12,fontWeight:700}}>{MONTHS_S[weekDates[0].getMonth()]} {weekDates[0].getDate()} – {weekDates[6].getDate()}, {weekDates[0].getFullYear()}</div>
        <button type="button" onClick={function(){var d=new Date(weekBase);d.setDate(d.getDate()+7);setWeekBase(d);}} style={{background:"none",border:"none",color:C.accent,fontSize:22,cursor:"pointer"}}>›</button>
      </div>
      <div style={{overflowX:"auto",overflowY:"auto",maxHeight:"calc(100vh - 300px)"}}>
        <div style={{minWidth:360}}>
          <div style={{display:"flex",borderBottom:"1px solid "+C.border,position:"sticky",top:0,background:C.bg,zIndex:10}}>
            <div style={{width:38,flexShrink:0}}/>
            {weekDates.map(function(d,i){
              var isToday=toStr(d)===todayStr();
              return <div key={i} style={{flex:1,textAlign:"center",padding:"5px 2px",minWidth:48}}>
                <div style={{fontSize:10,color:C.muted}}>{DAYS[d.getDay()]}</div>
                <div style={{width:24,height:24,borderRadius:"50%",background:isToday?C.accent:"transparent",color:isToday?"#000":C.text,fontWeight:isToday?900:400,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",margin:"2px auto 0"}}>{d.getDate()}</div>
              </div>;
            })}
          </div>
          {hours.map(function(hour){
            return [0,30].map(function(min){
              return <div key={hour+"-"+min} style={{display:"flex",borderBottom:"1px solid "+C.border+"22",minHeight:32}}>
                <div style={{width:38,flexShrink:0,display:"flex",alignItems:"flex-start",justifyContent:"flex-end",paddingRight:5,paddingTop:2}}>
                  {min===0&&<span style={{fontSize:9,color:C.muted}}>{hour}:00</span>}
                </div>
                {weekDates.map(function(d,di){
                  var ds=toStr(d);
                  var appt=getAppt(ds,hour,min);
                  var isWork=isWorkSlot(d,hour,min);
                  var bl=staff&&staff.blockedSlots&&staff.blockedSlots[ds];
                  var isBlocked=bl===true||(bl&&((bl.indexOf("morning")>=0&&hour<13)||(bl.indexOf("afternoon")>=0&&hour>=13)));
                  var col=appt?(STATUS_C[appt.status]||C.cyan):null;
                  return <div key={di}
                    onClick={function(){if(appt) onApptClick(appt); else if(isWork&&!isBlocked) onSlotClick(d,hour,min,selectedStaffId);}}
                    style={{flex:1,minWidth:48,borderLeft:"1px solid "+C.border+"22",position:"relative",background:!isWork?"#0a0c10":isBlocked?"#1a0808":"transparent",cursor:isWork&&!isBlocked?"pointer":"default"}}>
                    {appt&&<div style={{position:"absolute",inset:"1px 1px 1px 2px",background:col+"33",border:"1.5px solid "+col,borderRadius:5,padding:"2px 3px",overflow:"hidden",zIndex:2}}>
                      <div style={{fontSize:9,fontWeight:700,color:col,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{appt.clientName}</div>
                      <div style={{fontSize:8,color:C.muted,overflow:"hidden",whiteSpace:"nowrap"}}>{appt.service}</div>
                    </div>}
                    {isBlocked&&!appt&&<div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,"+C.danger+"11,"+C.danger+"11 4px,transparent 4px,transparent 8px)"}}/>}
                  </div>;
                })}
              </div>;
            });
          })}
        </div>
      </div>
      <div style={{display:"flex",gap:10,padding:"6px 12px",borderTop:"1px solid "+C.border,flexWrap:"wrap"}}>
        {[[C.cyan,"Confirmado"],[C.warn,"Pendiente"],["#8e44ad","Walk-in"],[C.danger,"Bloqueado"],["#0a0c10","No labora"]].map(function(pair){
          return <div key={pair[1]} style={{display:"flex",alignItems:"center",gap:4}}>
            <div style={{width:8,height:8,borderRadius:2,background:pair[0]}}/>
            <span style={{fontSize:9,color:C.muted}}>{pair[1]}</span>
          </div>;
        })}
      </div>
    </div>
  );
}

// ── SCHEDULE PATTERN ──────────────────────────────────────────────
function ScheduleModal(props){
  var user=props.user,onClose=props.onClose,onSave=props.onSave;
  var wdState=useState(user.workDays||[1,2,3,4,5]);var workDays=wdState[0];var setWorkDays=wdState[1];
  var wsState=useState(user.workStart||"09:00");var workStart=wsState[0];var setWorkStart=wsState[1];
  var weState=useState(user.workEnd||"19:00");var workEnd=weState[0];var setWorkEnd=weState[1];
  var yrState=useState(new Date().getFullYear());var yr=yrState[0];var setYr=yrState[1];
  var moState=useState(new Date().getMonth());var mo=moState[0];var setMo=moState[1];
  var blState=useState(user.blockedSlots||{});var blocked=blState[0];var setBlocked=blState[1];

  var days=calDays(yr,mo);

  function toggleDay(dow){
    setWorkDays(function(p){return p.indexOf(dow)>=0?p.filter(function(d){return d!==dow;}):[].concat(p,[dow]).sort();});
  }
  function toggleDayBlock(ds){
    setBlocked(function(p){var n=Object.assign({},p);if(n[ds]) delete n[ds]; else n[ds]=true; return n;});
  }
  function applyPattern(){
    var nb=Object.assign({},blocked);
    days.forEach(function(d){if(!d) return; var ds=toStr(d); if(workDays.indexOf(d.getDay())<0) nb[ds]=true;});
    setBlocked(nb);
  }
  function save(){
    var updated=Object.assign({},user,{workDays:workDays,workStart:workStart,workEnd:workEnd,blockedSlots:blocked});
    onSave(updated);
  }

  var availDays=days.filter(function(d){return d&&workDays.indexOf(d.getDay())>=0&&!blocked[toStr(d)];}).length;
  var start=parseTime(workStart),end=parseTime(workEnd),slotsPerDay=Math.floor((end-start)/30);
  var totalSlots=availDays*slotsPerDay;

  return (
    <div style={S.overlay} onClick={onClose}>
      <div style={{...S.modalBox,maxHeight:"92vh"}} onClick={function(e){e.stopPropagation();}}>
        <div style={{...S.row,marginBottom:14}}>
          <div style={{fontSize:15,fontWeight:800,color:C.accent}}>Patron de Horario — {user.name}</div>
          <button type="button" onClick={onClose} style={{background:"none",border:"none",color:C.muted,fontSize:22,cursor:"pointer"}}>✕</button>
        </div>

        <div style={{fontSize:11,color:C.muted,marginBottom:7,fontWeight:700}}>DIAS LABORALES</div>
        <div style={{display:"flex",gap:5,marginBottom:13,flexWrap:"wrap"}}>
          {[["Do",0],["Lu",1],["Ma",2],["Mi",3],["Ju",4],["Vi",5],["Sa",6]].map(function(pair){
            var l=pair[0],d=pair[1];
            return <button type="button" key={d} onClick={function(){toggleDay(d);}} style={{padding:"6px 11px",borderRadius:20,border:"none",fontSize:12,fontWeight:700,cursor:"pointer",background:workDays.indexOf(d)>=0?C.cyan:"#1a2230",color:workDays.indexOf(d)>=0?"#000":C.muted}}>{l}</button>;
          })}
        </div>

        <div style={{fontSize:11,color:C.muted,marginBottom:7,fontWeight:700}}>HORARIO</div>
        <div style={{display:"flex",gap:10,marginBottom:13}}>
          <div style={{flex:1}}>
            <label style={S.label}>Entrada</label>

}

// ── REPORTES ─────────────────────────────────────────────────────
function Reportes(props){
  var appointments=props.appointments,sales=props.sales,clients=props.clients,users=props.users;
  var pState=useState("month");var period=pState[0];var setPeriod=pState[1];
  var sState=useState("all");var selStaff=sState[0];var setSelStaff=sState[1];

  var today=new Date();
  var thisMonth=today.toISOString().slice(0,7);
  var lastMonth=new Date(today.getFullYear(),today.getMonth()-1,1).toISOString().slice(0,7);
  var thisYear=today.getFullYear().toString();

  function pf(ds){
    if(!ds) return false;
    if(period==="week"){return (today-new Date(ds))/(1000*60*60*24)<=7;}
    if(period==="month") return ds.indexOf(thisMonth)===0;
    if(period==="lastmonth") return ds.indexOf(lastMonth)===0;
    if(period==="year") return ds.indexOf(thisYear)===0;
    return true;
  }

  var fa=appointments.filter(function(a){return pf(a.date)&&(selStaff==="all"||a.staffId===selStaff);});
  var fs=sales.filter(function(s){return pf(s.date);});
  var totalIng=fs.reduce(function(a,s){return a+s.total;},0);
  var totalCitas=fa.length;
  var conf=fa.filter(function(a){return a.status==="confirmado";}).length;
  var pend=fa.filter(function(a){return a.status==="pendiente";}).length;
  var walk=fa.filter(function(a){return a.status==="walk_in";}).length;
  var canc=fa.filter(function(a){return a.status==="cancelado";}).length;
  var tasa=totalCitas>0?Math.round((conf/totalCitas)*100):0;
  var ticket=fs.length>0?Math.round(totalIng/fs.length):0;

  var svcCount={};
  fa.filter(function(a){return a.status==="confirmado"||a.status==="walk_in";}).forEach(function(a){if(a.service) svcCount[a.service]=(svcCount[a.service]||0)+1;});
  var topSvcs=Object.entries(svcCount).sort(function(a,b){return b[1]-a[1];}).slice(0,5);

  var byMethod={};
  fs.forEach(function(s){byMethod[s.method]=(byMethod[s.method]||0)+s.total;});

  var staffList=users.filter(function(u){return u.role==="barbero"||u.role==="tatuador";});
  var staffPerf=staffList.map(function(u){
    return {name:u.name,id:u.id,citas:fa.filter(function(a){return a.staffId===u.id&&(a.status==="confirmado"||a.status==="walk_in");}).length};
  }).sort(function(a,b){return b.citas-a.citas;});
  var maxC=Math.max.apply(null,staffPerf.map(function(s){return s.citas;}).concat([1]));

  var byDay=[0,0,0,0,0,0,0];
  fa.forEach(function(a){if(a.date){var d=new Date(a.date).getDay();if(d>=0) byDay[d]++;}});
  var maxD=Math.max.apply(null,byDay.concat([1]));

  var pLabels={week:"Esta semana",month:"Este mes",lastmonth:"Mes anterior",year:"Este año",all:"Todo"};

  return (
    <div>
      <div style={{fontSize:16,fontWeight:700,color:C.accent,marginBottom:12}}>📊 Reportes</div>
      <div style={{display:"flex",gap:5,marginBottom:8,overflowX:"auto",paddingBottom:3}}>
        {[["week","7 días"],["month","Este mes"],["lastmonth","Mes ant."],["year","Este año"],["all","Todo"]].map(function(pair){
          return <button type="button" key={pair[0]} onClick={function(){setPeriod(pair[0]);}} style={{...S.btn(period===pair[0]?"gold":"ghost"),padding:"5px 9px",fontSize:11,whiteSpace:"nowrap",flexShrink:0,color:period===pair[0]?"#000":C.muted}}>{pair[1]}</button>;
        })}
      </div>
      <div style={{display:"flex",gap:5,marginBottom:14,overflowX:"auto",paddingBottom:3}}>
        <button type="button" onClick={function(){setSelStaff("all");}} style={{...S.btn(selStaff==="all"?"cyan":"ghost"),padding:"5px 9px",fontSize:11,whiteSpace:"nowrap",flexShrink:0,color:selStaff==="all"?"#000":C.muted}}>Todos</button>
        {staffList.map(function(u){
          return <button type="button" key={u.id} onClick={function(){setSelStaff(u.id);}} style={{...S.btn(selStaff===u.id?"cyan":"ghost"),padding:"5px 9px",fontSize:11,whiteSpace:"nowrap",flexShrink:0,color:selStaff===u.id?"#000":C.muted}}>{u.name.split(" ")[0]}</button>;
        })}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:12}}>
        {[["💰","Ingresos","$"+totalIng,C.accent],["📅","Citas",totalCitas,C.cyan],["🎯","Confirmacion",tasa+"%",C.success],["🎫","Ticket prom","$"+ticket,C.warn]].map(function(item){
          return <div key={item[1]} style={{background:item[3]+"18",border:"1px solid "+item[3]+"33",borderRadius:12,padding:"11px"}}>
            <div style={{fontSize:18}}>{item[0]}</div>
            <div style={{fontSize:20,fontWeight:900,color:item[3],marginTop:3}}>{item[2]}</div>
            <div style={{fontSize:11,color:C.muted}}>{item[1]}</div>
          </div>;
        })}
      </div>

      <div style={{...S.card,marginBottom:11}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>📋 Citas — {pLabels[period]}</div>
        {[[conf,"Confirmadas",C.cyan],[pend,"Pendientes",C.warn],[walk,"Walk-ins",C.success],[canc,"Canceladas",C.danger]].map(function(item){
          var pct=totalCitas>0?Math.round((item[0]/totalCitas)*100):0;
          return <div key={item[1]} style={{marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <span style={{fontSize:12,color:item[2],fontWeight:600}}>{item[1]}</span>
              <span style={{fontSize:12,color:C.muted}}>{item[0]} ({pct}%)</span>
            </div>
            <div style={{background:C.border,borderRadius:20,height:6}}>
              <div style={{width:pct+"%",height:"100%",background:item[2],borderRadius:20}}/>
            </div>

      </div>

      <div style={{...S.card,marginBottom:11}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>✂️ Servicios mas solicitados</div>
        {topSvcs.length===0&&<div style={{color:C.muted,fontSize:12,textAlign:"center",padding:10}}>Sin datos</div>}
        {topSvcs.map(function(pair,i){
          var pct=Math.round((pair[1]/Math.max(topSvcs[0][1],1))*100);
          var medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":"  ";
          return <div key={pair[0]} style={{marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <span style={{fontSize:12}}>{medal} {pair[0]}</span>
              <span style={{fontSize:12,color:C.accent,fontWeight:700}}>{pair[1]}</span>
            </div>
            <div style={{background:C.border,borderRadius:20,height:6}}>
              <div style={{width:pct+"%",height:"100%",background:"linear-gradient(90deg,"+C.accent+","+C.cyan+")",borderRadius:20}}/>
            </div>
          </div>;
        })}
      </div>

      <div style={{...S.card,marginBottom:11}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>👤 Rendimiento por profesional</div>
        {staffPerf.map(function(st){
          var pct=Math.round((st.citas/maxC)*100);
          return <div key={st.id} style={{marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <span style={{fontSize:12}}>{st.name}</span>
              <span style={{fontSize:12,color:C.cyan,fontWeight:700}}>{st.citas} citas</span>
            </div>
            <div style={{background:C.border,borderRadius:20,height:6}}>
              <div style={{width:pct+"%",height:"100%",background:C.cyan,borderRadius:20}}/>
            </div>
          </div>;
        })}
      </div>

      <div style={{...S.card,marginBottom:11}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>📆 Dias mas ocupados</div>
        <div style={{display:"flex",gap:3,alignItems:"flex-end",height:75,padding:"0 4px"}}>
          {["Do","Lu","Ma","Mi","Ju","Vi","Sa"].map(function(d,i){
            var h=byDay[i],pct=Math.round((h/maxD)*100),isTop=h===Math.max.apply(null,byDay);
            return <div key={d} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <div style={{fontSize:9,color:isTop?C.accent:C.muted,fontWeight:isTop?700:400}}>{h||""}</div>
              <div style={{width:"100%",borderRadius:"3px 3px 0 0",background:isTop?"linear-gradient(180deg,"+C.accent+","+C.cyan+")":C.border,height:Math.max(3,Math.round(pct*0.55))+"px"}}/>
              <div style={{fontSize:9,color:isTop?C.accent:C.muted,fontWeight:isTop?700:400}}>{d}</div>
            </div>;
          })}

      </div>

      <div style={{...S.card,marginBottom:11}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>💳 Metodos de pago</div>
        {Object.entries(byMethod).length===0&&<div style={{color:C.muted,fontSize:12,textAlign:"center",padding:10}}>Sin ventas</div>}
        {Object.entries(byMethod).map(function(pair){
          return <div key={pair[0]} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid "+C.border}}>
            <span style={{fontSize:13}}>{pair[0]==="efectivo"?"💵 Efectivo":pair[0]==="tarjeta"?"💳 Tarjeta":"🏦 Transferencia"}</span>

      <div style={{...S.card,marginBottom:11}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>👥 Clientes</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
          {[[clients.length,"Total",C.text],[clients.filter(function(c){return pf(c.memberSince||"");}).length,"Nuevos",C.success],[new Set(fa.map(function(a){return a.clientName;})).size,"Atendidos",C.cyan]].map(function(item){
            return <div key={item[1]} style={{textAlign:"center",background:"#161e2a",borderRadius:10,padding:"9px 5px"}}>
              <div style={{fontSize:20,fontWeight:900,color:item[2]}}>{item[0]}</div>
              <div style={{fontSize:10,color:C.muted}}>{item[1]}</div>
            </div>;

      </div>
    </div>
  );
}

function PublicView(props){

  var tabState=useState("booking");var pubTab=tabState[0];var setPubTab=tabState[1];
  var stepState=useState(1);var step=stepState[0];var setStep=stepState[1];
  var svcState=useState(null);var svc=svcState[0];var setSvc=svcState[1];
  var staffState=useState(null);var staff=staffState[0];var setStaff=staffState[1];
  var dateState=useState(null);var date=dateState[0];var setDate=dateState[1];
  var timeState=useState(null);var time=timeState[0];var setTime=timeState[1];
  var nameState=useState("");var name=nameState[0];var setName=nameState[1];
  var phoneState=useState("");var phone=phoneState[0];var setPhone=phoneState[1];
  var errState=useState("");var err=errState[0];var setErr=errState[1];
  var yrState=useState(new Date().getFullYear());var yr=yrState[0];var setYr=yrState[1];
  var moState=useState(new Date().getMonth());var mo=moState[0];var setMo=moState[1];
  var vmState=useState("month");var viewMode=vmState[0];var setViewMode=vmState[1];
  var lpState=useState("");var loyPhone=lpState[0];var setLoyPhone=lpState[1];
  var lvState=useState(false);var loyView=lvState[0];var setLoyView=lvState[1];
  var regState=useState(false);var showReg=regState[0];var setShowReg=regState[1];
  var regNameState=useState("");var regName=regNameState[0];var setRegName=regNameState[1];
  var regPhState=useState("");var regPh=regPhState[0];var setRegPh=regPhState[1];
  var regEmState=useState("");var regEm=regEmState[0];var setRegEm=regEmState[1];

  var staffList=users.filter(function(u){return u.role==="barbero"||u.role==="tatuador";});

  function slotOk(d,slot){
    if(!staff) return false;
    var ds=toStr(d);
    if(ds<todayStr()) return false;
    if(staff.workDays.indexOf(d.getDay())<0) return false;
    var sm=parseTime(slot);
    if(sm<parseTime(staff.workStart||"09:00")||sm>=parseTime(staff.workEnd||"19:00")) return false;
    var bl=staff.blockedSlots&&staff.blockedSlots[ds];
    if(bl===true) return false;
    return !appointments.some(function(a){return a.staffId===staff.id&&a.date===ds&&a.time===slot;});
  }

  function dayStatus(d){
    if(!staff) return "na";
    var ds=toStr(d),ts=todayStr();
    if(ds<ts) return "past";
    if(staff.workDays.indexOf(d.getDay())<0) return "off";
    var bl=staff.blockedSlots&&staff.blockedSlots[ds];
    if(bl===true) return "blocked";
    var ok=SLOTS.filter(function(s){return slotOk(d,s);});
    return ok.length===0?"full":"avail";
  }

  var avSlots={m:[],a:[]};
  if(staff&&date){
    SLOTS.forEach(function(s){if(slotOk(date,s)){if(parseTime(s)<13*60) avSlots.m.push(s); else avSlots.a.push(s);}});
  }

  async function confirm(){
    if(!name||!phone){setErr("Completa tu nombre y telefono");return;}
    var appt={id:"a"+Date.now(),clientName:name,phone:phone,service:svc?svc.name:"",staffId:staff?staff.id:null,date:toStr(date),time:time,status:"pendiente",duration:svc?svc.duration:30};
    await DB.save("appointments",appt.id,appt);
    onBook(appt);
    setStep(5);
  }

  var days=calDays(yr,mo);
  var DC={avail:C.card,off:"#080c10",blocked:"#1a0808",full:"#140808",past:"#080c10",na:"#080c10"};
  var DTC={avail:C.text,off:C.border,blocked:C.danger,full:C.danger,past:C.border,na:C.border};

  // Loyalty view
  var loyClient=null;
  if(loyView&&loyPhone){
    for(var i=0;i<clients.length;i++){if(clients[i].phone===loyPhone){loyClient=clients[i];break;}}
  }
  var loyAppts=loyClient?appointments.filter(function(a){return a.clientName===loyClient.name||a.phone===loyClient.phone;}).slice().reverse().slice(0,5):[];

  async function registerClient(){
    if(!regName||!regPh) return;
    var item={id:"c"+Date.now(),name:regName,phone:regPh,email:regEm,visits:0,lastVisit:"-",stamps:0,points:0,memberSince:todayStr()};
    await DB.save("clients",item.id,item);
    onRegisterClient(item);
    setShowReg(false);
    setRegName("");setRegPh("");setRegEm("");
    setLoyPhone(regPh);setLoyView(true);
  }

    <div style={S.app}>

        <div style={{display:"flex",justifyContent:"center",marginBottom:8}}><Logo size={60}/></div>
        <div style={{fontSize:26,fontWeight:900,background:"linear-gradient(90deg,#c9a84c,#4ecdc4)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:4}}>TASECA</div>

              <div style={{textAlign:"center",marginBottom:18}}>
                <div style={{fontSize:36,marginBottom:8}}>🎫</div>

function Login(props){

            </div>
            <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:22}}>
              {[0,1,2,3].map(function(i){return <div key={i} style={{width:14,height:14,borderRadius:"50%",background:i<pin.length?C.accent:C.border}}/>;  })}
            </div>
            {err&&<div style={{color:C.danger,fontSize:12,textAlign:"center",marginBottom:10}}>{err}</div>}
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,maxWidth:250,margin:"0 auto"}}>

                return <button type="button" key={n} onClick={function(){tap(String(n));}} style={{background:C.card,border:"1px solid "+C.border,borderRadius:12,padding:"15px",fontSize:20,fontWeight:700,color:C.text,cursor:"pointer",textAlign:"center"}}>{n}</button>;

            </div>
          </div>
        )}

  );

    var tmS=useState(d.time||"");var tm=tmS[0];var setTm=tmS[1];

    var wiS=useState(!d.id&&!d.date);var wi=wiS[0];var setWi=wiS[1];

      if(!cn||!sv) return;
      var now=new Date();
      var item={id:d.id||"a"+Date.now(),clientName:cn,service:sv,date:wi?todayStr():dt,time:wi?((now.getHours()<10?"0":"")+now.getHours()+":"+(now.getMinutes()<30?"00":"30")):tm,staffId:sf,status:wi?"walk_in":st,duration:30};

      closeM();
    }

    </Modal>;

  function SaleModal(){

    var toS=useState("");var to=toS[0];var setTo=toS[1];

      {modal&&modal.type==="user"&&<UserModal/>}

      {newApptSlot&&<ApptModal/>}

      {apptDet&&(
        <div style={S.overlay} onClick={function(){setApptDet(null);}}>
          <div style={S.modalBox} onClick={function(e){e.stopPropagation();}}>
            <div style={{...S.row,marginBottom:13}}>
              <div style={{fontSize:15,fontWeight:800,color:STATUS_C[apptDet.status]||C.accent}}>{STATUS_L[apptDet.status]||apptDet.status}</div>
              <button type="button" onClick={function(){setApptDet(null);}} style={{background:"none",border:"none",color:C.muted,fontSize:22,cursor:"pointer"}}>✕</button>
            </div>
            <div style={{fontSize:19,fontWeight:900,marginBottom:3}}>{apptDet.clientName}</div>
            <div style={{color:C.muted,fontSize:12,marginBottom:11}}>{apptDet.phone}</div>
            {[["Servicio",apptDet.service],["Fecha",apptDet.date],["Hora",apptDet.time]].map(function(pair){
              return <div key={pair[0]} style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:6,paddingBottom:6,borderBottom:"1px solid "+C.border}}>
                <span style={{color:C.muted}}>{pair[0]}</span><span style={{fontWeight:700}}>{pair[1]}</span>
              </div>;
            })}
            <div style={{display:"flex",gap:8,marginTop:11}}>
              <button type="button" style={{...S.btn("cyan"),flex:1,color:"#000",fontSize:12}} onClick={async function(){
                var upd=Object.assign({},apptDet,{status:"confirmado"});
                await DB.save("appointments",upd.id,upd);
                setAppointments(function(p){return p.map(function(x){return x.id===upd.id?upd:x;});});
                var mc=null;for(var i=0;i<clients.length;i++){if(clients[i].name===apptDet.clientName||clients[i].phone===apptDet.phone){mc=clients[i];break;}}
                if(mc){var ns=Math.min((mc.stamps||0)+1,10),mcu=Object.assign({},mc,{stamps:ns,points:(mc.points||0)+10,visits:(mc.visits||0)+1,lastVisit:todayStr()});await DB.save("clients",mc.id,mcu);setClients(function(p){return p.map(function(x){return x.id===mc.id?mcu:x;});});}
                setApptDet(null);
              }}>✓ Confirmar (+sello)</button>
              <button type="button" style={{...S.btn("danger"),flex:1,fontSize:12}} onClick={async function(){await DB.del("appointments",apptDet.id);setAppointments(function(p){return p.filter(function(x){return x.id!==apptDet.id;});});setApptDet(null);}}>Eliminar</button>
            </div>
          </div>
        </div>
      )}

      {schedUser&&<ScheduleModal user={schedUser} onClose={function(){setSchedUser(null);}} onSave={async function(upd){await DB.save("users",upd.id,upd);setUsers(function(u){return u.map(function(x){return x.id===upd.id?upd:x;});});setSchedUser(null);}}/>}
    </div>
  );
}

// ── ROOT ─────────────────────────────────────────────────────────
function App(){
  var scrState=useState("loading");var screen=scrState[0];var setScreen=scrState[1];
  var userState=useState(null);var user=userState[0];var setUser=userState[1];
  var usersState=useState([]);var users=usersState[0];var setUsers=usersState[1];
  var svState=useState([]);var services=svState[0];var setServices=svState[1];
  var pdState=useState([]);var products=pdState[0];var setProducts=pdState[1];
  var clState=useState([]);var clients=clState[0];var setClients=clState[1];
  var apState=useState([]);var appointments=apState[0];var setAppointments=apState[1];
  var saState=useState([]);var sales=saState[0];var setSales=saState[1];

  var init=useCallback(async function(){
    try{
      var u=await DB.getAll("users");
      if(u.length===0){for(var i=0;i<DEF_USERS.length;i++) await DB.save("users",DEF_USERS[i].id,DEF_USERS[i]);u=DEF_USERS;}
      setUsers(u);
      var sv=await DB.getAll("services");
      if(sv.length===0){for(var j=0;j<DEF_SERVICES.length;j++) await DB.save("services",DEF_SERVICES[j].id,DEF_SERVICES[j]);sv=DEF_SERVICES;}
      setServices(sv);
      setProducts(await DB.getAll("products"));
      setClients(await DB.getAll("clients"));
      setAppointments(await DB.getAll("appointments"));
      setSales(await DB.getAll("sales"));
      setScreen("public");
    }catch(e){console.error(e);setScreen("public");}
  },[]);

  useEffect(function(){
    if(window._firebaseReady||window._fb) init();
    else window.addEventListener("fbReady",init,{once:true});
    return function(){window.removeEventListener("fbReady",init);};
  },[init]);

  if(screen==="loading") return (
    <div style={{...S.app,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}>
      <Logo size={70}/>
      <div style={{color:C.accent,fontSize:18,fontWeight:900,marginTop:16,letterSpacing:4}}>TASECA</div>
      <div style={{color:C.muted,fontSize:12,marginTop:8}}>Conectando...</div>
    </div>
  );

  if(screen==="login") return <Login users={users} onLogin={function(u){setUser(u);setScreen("admin");}} onBack={function(){setScreen("public");}}/>;
  if(screen==="admin") return <Admin user={user} users={users} setUsers={setUsers} services={services} setServices={setServices} products={products} setProducts={setProducts} clients={clients} setClients={setClients} appointments={appointments} setAppointments={setAppointments} sales={sales} setSales={setSales} onLogout={function(){setUser(null);setScreen("public");}}/>;
  return <PublicView services={services} appointments={appointments} users={users} clients={clients} onBook={function(a){setAppointments(function(p){return p.concat([a]);});}} onGoAdmin={function(){setScreen("login");}} onRegisterClient={function(c){setClients(function(p){return p.concat([c]);});}}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
