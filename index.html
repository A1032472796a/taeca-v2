var _useState=React.useState,_useEffect=React.useEffect,_useRef=React.useRef,_useMemo=React.useMemo,_useCallback=React.useCallback;

/* ─── BREAKPOINT HOOK ──────────────────────────────────────── */
function useBreakpoint(){
  var ws=_useState(window.innerWidth>=768);var isMd=ws[0];var setIsMd=ws[1];
  _useEffect(function(){
    function upd(){setIsMd(window.innerWidth>=768);}
    window.addEventListener("resize",upd);
    return function(){window.removeEventListener("resize",upd);};
  },[]);
  return isMd;
}

/* ─── SUPABASE DB ───────────────────────────────────────────────── */
/* Mapeo de nombres de colección Firebase → tabla Supabase */
var TBL={users:"users",clients:"clients",services:"services",products:"products",appointments:"appointments",sales:"sales",config:"config"};
/* Mapeo de campos snake_case para appointments */
function toRow(col,data){
  if(col==="appointments"){
    var r=Object.assign({},data);
    if(r.stId!==undefined){r.st_id=r.stId;delete r.stId;}
    /* Eliminar campos que no existen en la tabla Supabase */
    delete r.svcId;
    delete r.created_at;
    return r;
  }
  if(col==="config"){
    var r=Object.assign({},data);
    if(r.stampsOn!==undefined){r.stamps_on=r.stampsOn;delete r.stampsOn;}
    return r;
  }
  if(col==="users"){
    var r=Object.assign({},data);
    if(r.workDays!==undefined){r.work_days=r.workDays;delete r.workDays;}
    if(r.wStart!==undefined){r.w_start=r.wStart;delete r.wStart;}
    if(r.wEnd!==undefined){r.w_end=r.wEnd;delete r.wEnd;}
    /* Eliminar campos que no existen en la tabla */
    delete r.blockedSlots;
    return r;
  }
  if(col==="clients"){
    var r=Object.assign({},data);
    delete r.created_at;
    return r;
  }
  if(col==="sales"){
    var r=Object.assign({},data);
    delete r.created_at;
    return r;
  }
  return data;
}
function fromRow(col,row){
  if(!row)return row;
  if(col==="appointments"){
    var r=Object.assign({},row);
    if(r.st_id!==undefined){r.stId=r.st_id;delete r.st_id;}
    return r;
  }
  if(col==="config"){
    var r=Object.assign({},row);
    if(r.stamps_on!==undefined){r.stampsOn=r.stamps_on;delete r.stamps_on;}
    return r;
  }
  if(col==="users"){
    var r=Object.assign({},row);
    if(r.work_days!==undefined){r.workDays=r.work_days;delete r.work_days;}
    if(r.w_start!==undefined){r.wStart=r.w_start;delete r.w_start;}
    if(r.w_end!==undefined){r.wEnd=r.w_end;delete r.w_end;}
    return r;
  }
  return row;
}
var DB={
  save:async function(col,id,data){
    var tbl=TBL[col]||col;
    var row=toRow(col,Object.assign({},data,{id:String(id)}));
    var res=await window._sb.from(tbl).upsert(row,{onConflict:"id"});
    if(res.error)throw res.error;
  },
  del:async function(col,id){
    var tbl=TBL[col]||col;
    var res=await window._sb.from(tbl).delete().eq("id",String(id));
    if(res.error)throw res.error;
  },
  all:async function(col){
    var tbl=TBL[col]||col;
    var res=await window._sb.from(tbl).select("*");
    if(res.error)throw res.error;
    return (res.data||[]).map(function(r){return fromRow(col,r);});
  }
};

/* ─── HELPERS ───────────────────────────────────────────────────── */
function pt(t){var p=t.split(":");return parseInt(p[0])*60+parseInt(p[1]);}
function ts(d){return d.toISOString().slice(0,10);}
function today(){return ts(new Date());}
function vPhone(p){return (p||"").replace(/\D/g,"").length===10;}
function calDays(y,m){var days=[],f=new Date(y,m,1),l=new Date(y,m+1,0);for(var i=0;i<f.getDay();i++)days.push(null);for(var d=1;d<=l.getDate();d++)days.push(new Date(y,m,d));return days;}
function weekOf(base){var d=new Date(base),sun=new Date(d);sun.setDate(d.getDate()-d.getDay());return Array.from({length:7},function(_,i){var x=new Date(sun);x.setDate(sun.getDate()+i);return x;});}

        ?<select style={S.inp} value={p.val||""} onChange={function(e){p.set(e.target.value);}}>
           <option value="">Seleccionar...</option>
           {p.opts.map(function(o){return <option key={o.v} value={o.v}>{o.l}</option>;})}

/* ─── POINTS BAR ────────────────────────────────────────────────── */
function PtsBar(p){
  var pts=p.pts||0;
  var lvls=[{n:"Bronze",min:0,max:100,c:"#cd7f32"},{n:"Silver",min:100,max:300,c:"#aaa"},{n:"Gold",min:300,max:700,c:C.accent},{n:"Platinum",min:700,max:1500,c:C.cyan}];
  var cur=lvls[0];
  for(var i=0;i<lvls.length;i++){if(pts>=lvls[i].min&&(pts<lvls[i].max||i===lvls.length-1)){cur=lvls[i];break;}}
  var pct=Math.min(100,cur.max>cur.min?((pts-cur.min)/(cur.max-cur.min))*100:100);
  var nxt=lvls[lvls.indexOf(cur)+1];
  return (
    <div style={{background:"#161e2a",borderRadius:13,padding:"12px 13px",border:"1px solid "+cur.c+"44",marginTop:10}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>

        <b style={{color:C.accent,fontSize:13}}>{pts} pts</b>
      </div>
      <div style={{background:C.border,borderRadius:20,height:7,overflow:"hidden"}}>
        <div style={{width:pct+"%",height:"100%",background:"linear-gradient(90deg,"+cur.c+","+C.accent+")",borderRadius:20}}/>
      </div>

    </div>
  );

/* ─── WEEK CALENDAR ─────────────────────────────────────────────── */
function WeekCal(p){
  var appts=p.appts,users=p.users,stId=p.stId,onSlot=p.onSlot,onAppt=p.onAppt;
  var isDesk=useBreakpoint();
  var ws=_useState(new Date());var wb=ws[0];var setWb=ws[1];
  var wk=weekOf(wb);
  var staff=null;for(var i=0;i<users.length;i++){if(users[i].id===stId){staff=users[i];break;}}
  var hrs=[];for(var h=6;h<22;h++)hrs.push(h);
  var wStrs=wk.map(function(d){return ts(d);});
  var wa=appts.filter(function(a){return(!stId||a.stId===stId)&&wStrs.indexOf(a.date)>=0;});

  function isWork(date,hr,mn){
    if(!staff)return true;
    if(!staff.workDays||staff.workDays.indexOf(date.getDay())<0)return false;
    var t=hr*60+mn,s=pt(staff.wStart||"09:00"),e=pt(staff.wEnd||"19:00");
    return t>=s&&t<e;
  }
  function getAppt(ds,hr,mn){
    var slot=(hr<10?"0":"")+hr+":"+(mn===0?"00":"30");
    for(var i=0;i<wa.length;i++){if(wa[i].date===ds&&wa[i].time===slot)return wa[i];}
    return null;
  }

  return (
    <div style={{background:C.bg,border:"1px solid "+C.border,borderRadius:12,overflow:"hidden"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",borderBottom:"1px solid "+C.border}}>
        <button type="button" onClick={function(){var d=new Date(wb);d.setDate(d.getDate()-7);setWb(d);}} style={{background:"none",border:"none",color:C.accent,fontSize:20,cursor:"pointer",padding:"2px 6px"}}>‹</button>
        <span style={{fontSize:12,fontWeight:700}}>{MS[wk[0].getMonth()]} {wk[0].getDate()} – {wk[6].getDate()}, {wk[0].getFullYear()}</span>
        <button type="button" onClick={function(){var d=new Date(wb);d.setDate(d.getDate()+7);setWb(d);}} style={{background:"none",border:"none",color:C.accent,fontSize:20,cursor:"pointer",padding:"2px 6px"}}>›</button>
      </div>
      <div style={{overflowX:"auto",overflowY:"auto",maxHeight:isDesk?"calc(100vh - 200px)":"calc(100vh - 310px)"}}>
        <div style={{minWidth:340}}>
          <div style={{display:"flex",borderBottom:"2px solid "+C.border,position:"sticky",top:0,background:C.bg,zIndex:5}}>
            <div style={{width:36,flexShrink:0,borderRight:"1px solid #ffffff22"}}/>
            {wk.map(function(d,i){var isT=ts(d)===today();return <div key={i} style={{flex:1,textAlign:"center",padding:"5px 1px",minWidth:44,borderLeft:"1px solid #ffffff14"}}>
              <div style={{fontSize:9,color:C.muted}}>{DY[d.getDay()]}</div>
              <div style={{width:22,height:22,borderRadius:"50%",background:isT?C.accent:"transparent",color:isT?"#000":C.text,fontSize:11,display:"flex",alignItems:"center",justifyContent:"center",margin:"1px auto 0",fontWeight:isT?900:400}}>{d.getDate()}</div>
            </div>;
            })}
          </div>
          {hrs.map(function(hr){return [0,30].map(function(mn){

function Public(p){
  var svcs=p.svcs,appts=p.appts,users=p.users,clients=p.clients,cfg=p.cfg,onBook=p.onBook,onAdmin=p.onAdmin,onReg=p.onReg;
  var stampsOn=cfg&&cfg.stampsOn;
  var isDesk=useBreakpoint();

  var tabs=_useState("booking");var ptab=tabs[0];var setPtab=tabs[1];
  var stepS=_useState(1);var step=stepS[0];var setStep=stepS[1];
  var svcS=_useState(null);var svc=svcS[0];var setSvc=svcS[1];
  var stfS=_useState(null);var stf=stfS[0];var setStf=stfS[1];
  var dtS=_useState(null);var dt=dtS[0];var setDt=dtS[1];
  var tmS=_useState(null);var tm=tmS[0];var setTm=tmS[1];
  var nmS=_useState("");var nm=nmS[0];var setNm=nmS[1];
  var phS=_useState("");var ph=phS[0];var setPh=phS[1];
  var errS=_useState("");var err=errS[0];var setErr=errS[1];
  var yrS=_useState(new Date().getFullYear());var yr=yrS[0];var setYr=yrS[1];
  var moS=_useState(new Date().getMonth());var mo=moS[0];var setMo=moS[1];

  var rnS=_useState("");var rn=rnS[0];var setRn=rnS[1];
  var rpS=_useState("");var rp=rpS[0];var setRp=rpS[1];
  var reS=_useState("");var re=reS[0];var setRe=reS[1];
  var rbS=_useState("");var rb=rbS[0];var setRb=rbS[1];
  var rerrS=_useState("");var rerr=rerrS[0];var setRerr=rerrS[1];
  var rdoneS=_useState(false);var rdone=rdoneS[0];var setRdone=rdoneS[1];

  var lpS=_useState("");var lp=lpS[0];var setLp=lpS[1];
  var lvS=_useState(false);var lv=lvS[0];var setLv=lvS[1];

  var staffL=users.filter(function(u){return u.role==="barbero"||u.role==="tatuador";});

  function slotOk(d,sl){
    if(!stf)return false;
    var ds=ts(d);if(ds<today())return false;
    if(!stf.workDays||stf.workDays.indexOf(d.getDay())<0)return false;
    var sm=pt(sl);if(sm<pt(stf.wStart||"09:00")||sm>=pt(stf.wEnd||"19:00"))return false;
    var bl=stf.blocks&&stf.blocks[ds];if(bl===true)return false;
    return !appts.some(function(a){return a.stId===stf.id&&a.date===ds&&a.time===sl;});
  }

  function dayOk(d){
    if(!stf)return false;
    var ds=ts(d);if(ds<today())return false;
    if(!stf.workDays||stf.workDays.indexOf(d.getDay())<0)return false;
    var bl=stf.blocks&&stf.blocks[ds];if(bl===true)return false;
    return SLOTS.some(function(sl){return slotOk(d,sl);});
  }

  var avSlots={m:[],a:[]};
  if(stf&&dt){SLOTS.forEach(function(sl){if(slotOk(dt,sl)){if(pt(sl)<13*60)avSlots.m.push(sl);else avSlots.a.push(sl);}});}

  async function confirm(){
    if(!nm){setErr("Ingresa tu nombre");return;}
    if(!vPhone(ph)){setErr("El telefono debe tener exactamente 10 digitos");return;}
    var a={id:"a"+Date.now(),client:nm,phone:ph,svc:svc?svc.name:"",svcId:svc?svc.id:"",stId:stf?stf.id:null,date:ts(dt),time:tm,status:"pendiente",dur:svc?svc.dur:30};
    /* Show success immediately, save in background */
    onBook(a);
    setStep(5);
    /* Solo notificar al admin — sin sonido local para el cliente */

/* ─── NOTIFICACIONES ────────────────────────────────────────── */
function useNewApptNotif(appts){
  var lastSeenS=_useRef(null);
  var alertS=_useState(null);var setAlert=alertS[1];

  _useEffect(function(){
    if(!appts||appts.length===0){lastSeenS.current=Date.now();return;}
    if(lastSeenS.current===null){lastSeenS.current=Date.now();return;}
    var newOnes=appts.filter(function(a){
      if(!a.id)return false;
      var ms=parseInt((a.id+"").replace(/\D/g,"").slice(0,13));
      return ms>lastSeenS.current;
    });
    if(newOnes.length>0){
      var a=newOnes[newOnes.length-1];
      setAlert({client:a.client,svc:a.svc,date:a.date,time:a.time,status:a.status});
      lastSeenS.current=Date.now();
      /* Solo sonido + notif local del navegador — el push remoto
         ya fue enviado desde la vista pública al guardar la cita */
      playNotifSound();
      if(window.Notification&&Notification.permission==="granted"){
        try{new Notification("🔔 Nueva cita — Taseca",{
          body:(a.client||"")+" · "+(a.svc||""),
          icon:"icon-192.png",
          tag:"taseca-nuevacita"
        });}catch(e){}
      }
    }
  },[appts]);

  return alertS;
}

/* ─── SONIDO de notificación (Web Audio API — compatible iOS Safari) ─── */
/* iOS requiere que el AudioContext se cree Y reanude dentro del mismo
   evento de toque del usuario. Lo guardamos globalmente para reusar. */
window._audioCtx=null;

function _getAudioCtx(){
  try{
    if(!window._audioCtx){
      window._audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    }
    /* iOS pone el contexto en 'suspended' hasta interacción — lo reanudamos */
    if(window._audioCtx.state==="suspended"){
      window._audioCtx.resume();
    }
    return window._audioCtx;
  }catch(e){return null;}
}

/* Llamar esto dentro de un onClick/onTouchEnd directo para desbloquear iOS */
function unlockAudio(){
  var ctx=_getAudioCtx();
  if(!ctx)return;
  /* Tono silencioso de 1ms para desbloquear el contexto en iOS */
  var buf=ctx.createBuffer(1,1,22050);
  var src=ctx.createBufferSource();
  src.buffer=buf;
  src.connect(ctx.destination);
  src.start(0);
}

function playNotifSound(){
  try{
    var ctx=_getAudioCtx();
    if(!ctx)return;
    function tone(freq,start,dur,vol){
      var o=ctx.createOscillator();
      var g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type="sine";o.frequency.value=freq;
      g.gain.setValueAtTime(0,ctx.currentTime+start);
      g.gain.linearRampToValueAtTime(vol||0.28,ctx.currentTime+start+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+start+dur);
      o.start(ctx.currentTime+start);
      o.stop(ctx.currentTime+start+dur+0.05);
    }
    tone(523,0,   0.15,0.28);
    tone(659,0.18,0.15,0.28);
    tone(784,0.36,0.25,0.32);
  }catch(e){}
}

/* helper para enviar notificacion desde cualquier parte */
function pushNotif(title,body){
  playNotifSound();
  if(window.Notification&&Notification.permission==="granted"){
    try{new Notification(title,{body:body,icon:"icon-192.png"});}catch(e){}
  }
  if(window.sendPushNotif){window.sendPushNotif(title,body,"all");}
}

      .subscribe();

}

</script>

var PUSH_URL="https://xqezegrphnwfxyuxadzd.supabase.co/functions/v1/send-push";
var SCOPE = "/";
function urlB64(b){var p=(4-b.length%4)%4,s=b.replace(/-/g,"+").replace(/_/g,"/").padEnd(b.length+p,"="),r=atob(s),u=new Uint8Array(r.length);for(var i=0;i<r.length;i++)u[i]=r.charCodeAt(i);return u;}
window.swReady=null;
if("serviceWorker"in navigator){navigator.serviceWorker.register(SCOPE+"sw.js",{scope:SCOPE}).then(function(r){window.swReady=r;}).catch(function(e){console.warn("SW:",e);});}
window.subscribePush=async function(role,uid){
  try{
    await navigator.serviceWorker.ready;
    var reg=window.swReady||await navigator.serviceWorker.getRegistration();
    if(!reg)return false;
    var sub=await reg.pushManager.getSubscription()||await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64(VAPID_PUBLIC)});
    await window._sb.from("push_subscriptions").upsert({endpoint:sub.endpoint,subscription:sub.toJSON(),role:role||"admin",user_id:uid||null},{onConflict:"endpoint"});
    return true;
  }catch(e){console.warn("subscribePush:",e);return false;}
};
window.sendPushNotif=async function(title,body,role){
  try{await fetch(PUSH_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({title:title,body:body,tag:"taseca",url:SCOPE,target_role:role||"all"})});}catch(e){}
};

/* Desbloquear AudioContext en el primer toque — clave para iOS */
document.addEventListener("touchstart",function onFirstTouch(){
  if(window._audioCtx&&window._audioCtx.state==="suspended"){
    window._audioCtx.resume();
  }
  document.removeEventListener("touchstart",onFirstTouch);
},{once:true,passive:true});
</script>
